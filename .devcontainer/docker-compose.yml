services:
  carla:
    profiles: [carla]
    image: carlasim/carla:0.9.15
    command: >-
      /bin/bash -c "
        while true; do
          rm -rf /dev/shm/* 2>/dev/null || true;
          ./CarlaUE4.sh -RenderOffScreen -nosound -world-port=2000;
          echo 'CARLA exited, restarting in 3s...';
          sleep 3;
        done
      "
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: sleep infinity
